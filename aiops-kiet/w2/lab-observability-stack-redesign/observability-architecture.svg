<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="860" viewBox="0 0 1680 860">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#455a64"/>
    </marker>
    <style>
      .title { font: 700 26px Inter, Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 400 14px Inter, Arial, sans-serif; fill: #486581; }
      .group { fill: #ffffff; stroke: #90a4ae; stroke-width: 2; rx: 18; ry: 18; }
      .saas { fill: #e8f3ff; stroke: #1b4d89; }
      .edge { fill: #eef9f0; stroke: #2d6a4f; }
      .storage { fill: #fff3e0; stroke: #c77700; }
      .node { fill: #ffffff; stroke: #627d98; stroke-width: 1.5; rx: 12; ry: 12; }
      .nodeEdge { fill: #fff8e1; stroke: #b26a00; }
      .nodeBlue { fill: #e3f2fd; stroke: #1565c0; }
      .nodePurple { fill: #f3e5f5; stroke: #7b1fa2; }
      .label { font: 600 14px Inter, Arial, sans-serif; fill: #102a43; text-anchor: middle; }
      .small { font: 400 12px Inter, Arial, sans-serif; fill: #243b53; text-anchor: middle; }
      .edgeLine { stroke: #455a64; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashLine { stroke: #fb8c00; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="840" y="40" class="title" text-anchor="middle">GeekShop Observability Redesign</text>
  <text x="840" y="64" class="subtitle" text-anchor="middle">OTel Collector at the edge, Grafana LGTM in the middle, PagerDuty kept for routing</text>

  <rect x="30" y="100" width="920" height="690" class="group edge"/>
  <text x="60" y="130" class="label" text-anchor="start">GeekShop Kubernetes</text>

  <rect x="1000" y="100" width="520" height="690" class="group saas"/>
  <text x="1030" y="130" class="label" text-anchor="start">Grafana SaaS / Managed</text>

  <rect x="1000" y="640" width="520" height="150" class="group storage"/>
  <text x="1030" y="670" class="label" text-anchor="start">Cold Storage</text>

  <g>
    <rect x="60" y="170" width="150" height="44" class="node"/><text x="135" y="198" class="label">checkout</text>
    <rect x="60" y="225" width="150" height="44" class="node"/><text x="135" y="253" class="label">cart</text>
    <rect x="60" y="280" width="150" height="44" class="node"/><text x="135" y="308" class="label">payment</text>
    <rect x="60" y="335" width="150" height="44" class="node"/><text x="135" y="363" class="label">order</text>
    <rect x="60" y="390" width="150" height="44" class="node"/><text x="135" y="418" class="label">inventory</text>
    <rect x="60" y="445" width="150" height="44" class="node"/><text x="135" y="473" class="label">catalog</text>
    <rect x="60" y="500" width="150" height="44" class="node"/><text x="135" y="528" class="label">auth</text>
    <rect x="60" y="555" width="150" height="44" class="node"/><text x="135" y="583" class="label">search</text>
    <rect x="60" y="610" width="150" height="44" class="node"/><text x="135" y="638" class="label">shipping</text>
    <rect x="60" y="665" width="150" height="44" class="node"/><text x="135" y="693" class="label">notification</text>
  </g>

  <rect x="280" y="330" width="170" height="76" class="node nodeEdge"/><text x="365" y="362" class="label">OTel Collector</text><text x="365" y="383" class="small">DaemonSet</text>
  <rect x="490" y="330" width="150" height="64" class="node nodeEdge"/><text x="565" y="357" class="label">Tail Sampling</text>
  <rect x="670" y="330" width="150" height="64" class="node nodeEdge"/><text x="745" y="357" class="label">Label Filtering</text>

  <rect x="1040" y="180" width="170" height="58" class="node nodeBlue"/><text x="1125" y="206" class="label">Mimir</text><text x="1125" y="226" class="small">Metrics</text>
  <rect x="1240" y="180" width="170" height="58" class="node nodeBlue"/><text x="1325" y="206" class="label">Loki</text><text x="1325" y="226" class="small">Logs</text>
  <rect x="1040" y="280" width="170" height="58" class="node nodeBlue"/><text x="1125" y="306" class="label">Tempo</text><text x="1125" y="326" class="small">Traces</text>
  <rect x="1240" y="280" width="170" height="58" class="node nodeBlue"/><text x="1325" y="306" class="label">Grafana UI</text><text x="1325" y="326" class="small">Unified</text>
  <rect x="1040" y="380" width="170" height="58" class="node nodeBlue"/><text x="1125" y="406" class="label">Alertmanager</text>
  <rect x="1240" y="380" width="170" height="58" class="node nodePurple"/><text x="1325" y="406" class="label">PagerDuty</text><text x="1325" y="426" class="small">Business</text>
  <rect x="1240" y="470" width="170" height="58" class="node nodePurple"/><text x="1325" y="496" class="label">Slack</text>

  <rect x="1080" y="690" width="260" height="60" class="node storage"/><text x="1210" y="718" class="label">S3 Archive</text><text x="1210" y="738" class="small">30+ days retention</text>

